<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Redline Motors</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
    <script src="js/api-client.js"></script>
    <script src="js/toast.js"></script>
    <style>
        body {
            background-color: #0b0b0b;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-top: 100px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .admin-container {
            max-width: 1200px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* Стиль стеклянной панели */
        .glass-panel {
            background: rgba(25, 25, 25, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 30px;
            color: #ffffff;
            font-weight: 700;
            border-bottom: 2px solid rgba(230, 57, 70, 0.3);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Форма входа */
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            text-align: center;
        }

        .login-box h3 {
            font-size: 24px;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a0a0a0;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }

        .form-group input:focus {
            border-color: #e63946;
            background: rgba(255, 255, 255, 0.08);
        }

        .admin-btn {
            background: #e63946;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .admin-btn:hover {
            background: #c92a38;
        }

        .admin-btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: #c92a38;
        }

        .btn-danger:hover {
            background: #a71e2b;
        }

        /* Табы */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #a0a0a0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            transition: color 0.3s, background 0.3s;
        }

        .tab-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: #ffffff;
            background: rgba(230, 57, 70, 0.15);
            border: 1px solid rgba(230, 57, 70, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Таблицы */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-weight: 600;
            padding: 16px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #d0d0d0;
            vertical-align: top;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Статусы заказов */
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-new {
            background: rgba(58, 134, 200, 0.15);
            color: #3a86c8;
            border: 1px solid rgba(58, 134, 200, 0.3);
        }

        .status-processing {
            background: rgba(255, 178, 41, 0.15);
            color: #ffb229;
            border: 1px solid rgba(255, 178, 41, 0.3);
        }

        .status-completed {
            background: rgba(46, 196, 182, 0.15);
            color: #2ec4b6;
            border: 1px solid rgba(46, 196, 182, 0.3);
        }

        select.status-select {
            background: #1e1e1e;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            font-size: 13px;
        }

        select.status-select:focus {
            border-color: #e63946;
        }

        /* Индикатор подключения */
        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #a0a0a0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffb229;
            box-shadow: 0 0 8px #ffb229;
        }

        .status-dot.online {
            background: #2ec4b6;
            box-shadow: 0 0 8px #2ec4b6;
        }

        .status-dot.offline {
            background: #e63946;
            box-shadow: 0 0 8px #e63946;
        }

        /* Стили шапки */
        header {
            position: fixed !important;
            top: 0;
            left: 0;
            right: 0;
            background: #121212 !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000 !important;
        }

        .navbar {
            background-color: #121212 !important;
            padding: 20px 50px !important;
        }

        .logo span {
            color: #e63946;
        }
    </style>
</head>
<body>
    <header>
      <nav class="navbar">
        <a href="index.html" class="logo"><span>Redline</span> Motors</a>
        <ul class="nav-links">
          <li><a href="index.html">Главная</a></li>
          <li><a href="preorder.html">Предзаказ</a></li>
          <li><a href="contacts.html">Обратная связь</a></li>
        </ul>
      </nav>
    </header>

    <div class="admin-container">
        <!-- Блок авторизации -->
        <div id="login-section" class="login-box glass-panel">
            <h3>Вход в панель управления</h3>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="admin-btn" style="width: 100%; margin-top: 10px;">Войти</button>
            </form>
        </div>

        <!-- Основная панель -->
        <div id="dashboard-section" class="glass-panel" style="display: none;">
            <h2>
                Панель управления
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="api-status">
                        <div id="api-status-dot" class="status-dot"></div>
                        <span id="api-status-text">Соединение...</span>
                    </div>
                    <button id="logout-btn" class="admin-btn btn-secondary">Выйти</button>
                </div>
            </h2>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('orders-tab')">Предзаказы</button>
                <button class="tab-btn" onclick="switchTab('feedbacks-tab')">Обратная связь</button>
            </div>

            <!-- Вкладка предзаказов -->
            <div id="orders-tab" class="tab-content active">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Имя клиента</th>
                                <th>Телефон / Email</th>
                                <th>Модель</th>
                                <th>Конфигурация</th>
                                <th>Дата</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body">
                            <tr>
                                <td colspan="8" style="text-align: center; color: #a0a0a0;">Загрузка данных...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Вкладка обратной связи -->
            <div id="feedbacks-tab" class="tab-content">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Имя клиента</th>
                                <th>Контакты</th>
                                <th>Сообщение / Вопрос</th>
                                <th>Дата</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="feedbacks-table-body">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #a0a0a0;">Загрузка данных...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация отображения разделов
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('admin_token');
            if (token) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                checkApiStatus();
                loadDashboardData();
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('dashboard-section').style.display = 'none';
            }
        });

        // Функция пинга бэкенда для отображения статуса сети
        async function checkApiStatus() {
            const dot = document.getElementById('api-status-dot');
            const text = document.getElementById('api-status-text');
            try {
                const response = await fetch('http://localhost:8000/');
                if (response.ok) {
                    dot.className = 'status-dot online';
                    text.textContent = 'API Бэкенд запущен';
                } else {
                    throw new Error('API error');
                }
            } catch (e) {
                dot.className = 'status-dot offline';
                text.textContent = 'Бэкенд отключен';
                showToast('Ошибка подключения к бэкенду. Убедитесь, что сервер FastAPI запущен на порту 8000.', 'error');
            }
        }

        // Авторизация
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('admin_token', data.access_token);
                    showToast('Вход успешно выполнен!', 'success');
                    setTimeout(() => window.location.reload(), 800);
                } else {
                    showToast('Неверное имя пользователя или пароль.', 'error');
                }
            } catch (err) {
                showToast('Ошибка при авторизации. Бэкенд не отвечает.', 'error');
            }
        });

        // Выход
        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.removeItem('admin_token');
            showToast('Вы вышли из системы.', 'info');
            setTimeout(() => window.location.reload(), 800);
        });

        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Загрузка всех данных
        async function loadDashboardData() {
            await Promise.all([loadOrders(), loadFeedbacks()]);
        }

        // Форматирование даты
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Загрузка предзаказов
        async function loadOrders() {
            const tableBody = document.getElementById('orders-table-body');
            try {
                const response = await apiRequest('/api/admin/orders');
                if (!response.ok) throw new Error('Failed to load orders');
                const orders = await response.json();

                if (orders.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #a0a0a0;">Предзаказы отсутствуют</td></tr>';
                    return;
                }

                tableBody.innerHTML = orders.map(order => {
                    const statusClass = `status-${order.status}`;
                    const statusLabel = order.status === 'new' ? 'Новый' : order.status === 'processing' ? 'В обработке' : 'Завершен';
                    return `
                        <tr>
                            <td><strong>#${order.id}</strong></td>
                            <td>${escapeHtml(order.customer_name)}</td>
                            <td>
                                📞 ${escapeHtml(order.customer_phone)}<br>
                                ${order.customer_email ? `✉️ ${escapeHtml(order.customer_email)}` : '<span style="color: #666;">нет email</span>'}
                            </td>
                            <td><span style="color: #e63946; font-weight: 600;">${escapeHtml(order.car_model)}</span></td>
                            <td>
                                🎨 Цвет: ${order.color ? escapeHtml(order.color) : '<span style="color: #666;">не указан</span>'}<br>
                                <div style="font-size: 12px; color: #a0a0a0; max-width: 250px; white-space: normal;">
                                    📝 ${order.comments ? escapeHtml(order.comments) : '<span style="color: #666;">без примечаний</span>'}
                                </div>
                            </td>
                            <td>${formatDate(order.created_at)}</td>
                            <td>
                                <select class="status-select" onchange="updateOrderStatus(${order.id}, this.value)">
                                    <option value="new" ${order.status === 'new' ? 'selected' : ''}>Новый</option>
                                    <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>В обработке</option>
                                    <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Завершен</option>
                                </select>
                            </td>
                            <td>
                                <button class="admin-btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteOrder(${order.id})">Удалить</button>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #e63946;">Ошибка загрузки предзаказов</td></tr>';
            }
        }

        // Изменение статуса предзаказа
        async function updateOrderStatus(orderId, newStatus) {
            try {
                const response = await apiRequest(`/api/admin/orders/${orderId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    showToast(`Статус заказа #${orderId} успешно изменен`, 'success');
                } else {
                    showToast('Не удалось обновить статус заказа', 'error');
                }
            } catch (err) {
                showToast('Ошибка при отправке запроса', 'error');
            }
        }

        // Удаление заказа
        async function deleteOrder(orderId) {
            if (!confirm(`Вы уверены, что хотите навсегда удалить предзаказ #${orderId}?`)) return;

            try {
                const response = await apiRequest(`/api/admin/orders/${orderId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast(`Предзаказ #${orderId} удален`, 'success');
                    loadOrders();
                } else {
                    showToast('Не удалось удалить предзаказ', 'error');
                }
            } catch (err) {
                showToast('Ошибка при отправке запроса', 'error');
            }
        }

        // Загрузка обратной связи
        async function loadFeedbacks() {
            const tableBody = document.getElementById('feedbacks-table-body');
            try {
                const response = await apiRequest('/api/admin/feedbacks');
                if (!response.ok) throw new Error('Failed to load feedbacks');
                const feedbacks = await response.json();

                if (feedbacks.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #a0a0a0;">Сообщения отсутствуют</td></tr>';
                    return;
                }

                tableBody.innerHTML = feedbacks.map(fb => {
                    return `
                        <tr>
                            <td><strong>#${fb.id}</strong></td>
                            <td>${escapeHtml(fb.name)}</td>
                            <td>
                                📞 ${escapeHtml(fb.phone)}<br>
                                ${fb.email ? `✉️ ${escapeHtml(fb.email)}` : '<span style="color: #666;">нет email</span>'}
                            </td>
                            <td>
                                <div style="white-space: normal; max-width: 450px; line-height: 1.4;">
                                    ${escapeHtml(fb.message || 'Без текста сообщения')}
                                </div>
                            </td>
                            <td>${formatDate(fb.created_at)}</td>
                            <td>
                                <button class="admin-btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteFeedback(${fb.id})">Удалить</button>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #e63946;">Ошибка загрузки обращений</td></tr>';
            }
        }

        // Удаление обращения
        async function deleteFeedback(feedbackId) {
            if (!confirm(`Вы уверены, что хотите навсегда удалить обращение #${feedbackId}?`)) return;

            try {
                const response = await apiRequest(`/api/admin/feedbacks/${feedbackId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast(`Обращение #${feedbackId} удалено`, 'success');
                    loadFeedbacks();
                } else {
                    showToast('Не удалось удалить обращение', 'error');
                }
            } catch (err) {
                showToast('Ошибка при отправке запроса', 'error');
            }
        }

        // Экранирование HTML
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
    </script>
</body>
</html>
