  <script>
    (function() {
      var checkbox = document.getElementById('active');
      if (!checkbox) return;

      // Close menu on link click
      var links = document.querySelectorAll('.wrapper a');
      links.forEach(function(link) {
        link.addEventListener('click', function() {
          checkbox.checked = false;
        });
      });

      // Close menu when clicking outside of the menu list (on the wrapper)
      var wrapper = document.querySelector('.wrapper');
      if (wrapper) {
        wrapper.addEventListener('click', function(e) {
          if (e.target === wrapper) {
            checkbox.checked = false;
          }
        });
      }
    })();
  </script>

  <script>
    // Burger menu toggle
    var burgerBtn = document.getElementById('burger-menu');
    var navLinksEl = document.querySelector('.nav-links');
    if (burgerBtn && navLinksEl) {
      burgerBtn.addEventListener('click', function() {
        navLinksEl.classList.toggle('nav-active');
        burgerBtn.classList.toggle('toggle');
      });
      document.addEventListener('click', function(e) {
        if (navLinksEl.classList.contains('nav-active') &&
            !navLinksEl.contains(e.target) &&
            !burgerBtn.contains(e.target)) {
          navLinksEl.classList.remove('nav-active');
          burgerBtn.classList.remove('toggle');
        }
      });
    }

    // Mobile dropdown toggle
    var dropdownBtn = document.querySelector('.dropdown .dropbtn');
    if (dropdownBtn) {
      dropdownBtn.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
          e.preventDefault();
          this.parentElement.classList.toggle('dropdown-open');
        }
      });
    }

    // Auto-rotating carousel
    (function() {
      var radios = document.querySelectorAll('input[name="carousel-control"]');
      if (radios.length === 0) return;

      var autoPlayInterval = 5000; // 5 seconds per slide
      var timerId = null;

      function nextSlide() {
        var activeIndex = 0;
        for (var i = 0; i < radios.length; i++) {
          if (radios[i].checked) {
            activeIndex = i;
            break;
          }
        }
        var nextIndex = (activeIndex + 1) % radios.length;
        radios[nextIndex].checked = true;
      }

      function startAutoPlay() {
        if (!timerId) {
          timerId = setInterval(nextSlide, autoPlayInterval);
        }
      }

      startAutoPlay();
    })();

    // Swipe gestures for carousel on mobile
    (function() {
      var slider = document.querySelector(".slider");
      if (!slider) return;
      var touchStartX = 0;
      var touchEndX = 0;

      slider.addEventListener("touchstart", function (e) {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });

      slider.addEventListener("touchend", function (e) {
        touchEndX = e.changedTouches[0].screenX;
        var swipeDistance = touchEndX - touchStartX;
        var threshold = 50;
        if (Math.abs(swipeDistance) > threshold) {
          var radios = document.querySelectorAll('input[name="carousel-control"]');
          var checkedIndex = -1;
          for (var i = 0; i < radios.length; i++) {
            if (radios[i].checked) {
              checkedIndex = i;
              break;
            }
          }
          if (checkedIndex !== -1) {
            if (swipeDistance < 0) {
              radios[(checkedIndex + 1) % radios.length].checked = true;
            } else {
              radios[(checkedIndex - 1 + radios.length) % radios.length].checked = true;
            }
          }
        }
      }, { passive: true });
    })();
